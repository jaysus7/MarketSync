name: Appointment reminders

# Fires the appointment-reminder endpoint every hour. Scheduled workflows run in
# UTC and only from the default branch. GitHub may delay a run under load — that's
# fine here, the endpoint is idempotent (each appointment is reminded once).
on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/appointment-reminders
        run: |
          curl -fsS -X POST \
            "https://vehicle-marketplace-s0e4.onrender.com/cron/appointment-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
