name: Weekly lot-health reports

# Fires the weekly-report endpoint every Monday morning (13:00 UTC ≈ 8–9am ET).
# Scheduled workflows run in UTC and only from the default branch.
on:
  schedule:
    - cron: '0 13 * * 1'   # Mondays at 13:00 UTC
  workflow_dispatch: {}     # manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/weekly-reports
        run: |
          curl -fsS -X POST \
            "https://vehicle-marketplace-s0e4.onrender.com/cron/weekly-reports" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
