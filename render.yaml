# Render Blueprint — makes MarketSync's deploy config version-controlled instead of
# living only in the Render dashboard (which is what let the deploy branch drift and
# caused "fixed in main but not live" confusion).
#
# TWO services: the Node backend API and the static marketing/dashboard site.
#
# ─────────────────────────────────────────────────────────────────────────────
# ADOPTING THIS ON EXISTING SERVICES:
#   Render matches blueprint services to existing ones BY NAME. Before syncing,
#   rename the `name:` fields below to EXACTLY match your current services, or
#   syncing will create NEW (duplicate) services. If you'd rather not risk it,
#   this file still documents the intended settings — just set Branch=main and
#   Auto-Deploy=Yes on each service in the dashboard.
#
# Secrets are declared with `sync: false` (values stay in the dashboard, never in
# git). OAUTH_STATE_SECRET is auto-generated by Render.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend API (Express) ──────────────────────────────────────────────────
  - type: web
    name: marketsync-backend            # ← rename to match your existing web service
    runtime: node
    rootDir: marketplace-backend
    branch: main
    autoDeploy: true
    plan: starter
    buildCommand: npm install && npm run build:kb
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://marketsync.link
      # Core platform (required — set in dashboard)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Field-level PII encryption (SIN/DOB + stored vendor creds). Fails closed.
      - key: PII_ENCRYPTION_KEY
        sync: false
      # Signs OAuth state for the QuickBooks/Xero/Google connect flow. Auto-generated.
      - key: OAUTH_STATE_SECRET
        generateValue: true
      # Email + data providers
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CARAPI_API
        sync: false
      - key: MARKETCHECK_API_KEY
        sync: false
      - key: OWNER_EMAIL
        sync: false
      # Accounting / messaging connectors (optional — leave unset until provisioned;
      # the connectors show "coming soon" until their app credentials exist)
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_ENV
        value: production
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

  # ── Marketing site + dashboard (static) ─────────────────────────────────────
  # No build step — the files under marketplace-frontend are served as-is.
  # _redirects (Netlify-compatible) proxies the blog sitemap + SSR blog routes.
  - type: web
    name: marketsync-site               # ← rename to match your existing static site
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: ""
    staticPublishPath: ./marketplace-frontend
